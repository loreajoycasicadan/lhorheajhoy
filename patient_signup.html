<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<form id="signup-container" action="emergency.html">
    <h2>Sign Up</h2>

    <input type="email" placeholder="Email Address *" id="email" required>
    <input type="password" placeholder="Password *" id="password" required>
    <input type="Contactnumber" placeholder="Contact Number *" id="contactNumber" required>
    <input type="Lname" placeholder="Last Name *" id="Lname" required>
    <input type="Mname" placeholder="Middle Name (optional)" id="Mname">
    <input type="Fname" placeholder="First Name *" id="Fname" required>
    <label for="dob" id="dob">Date of Birth</label>
    <input type="date" required>
    <input type="SSSNumber" placeholder="SSS Number (if Applicable)" id="sssNum">
    <input type="PHnumber" placeholder="PhilHealth Number (if Applicable)" id="philheathNum">

    <select id="maritalStatus" required>
        <option>Marital Status *</option>
        <option>Single</option>
        <option>Married</option>
        <option>Separated</option>
        <option>Widowed</option>
    </select>

    <select id="province">
        <option>Province *</option>
        <option>Iloilo</option>
    </select>

    <select id="town">
        <option>Town/City *</option>
        <option>Pavia</option>
    </select>

    <select id="barangay">
        <option>Barangay *</option>
        <option value="barangay1">Aganan</option>
        <option value="barangay2">Amparo</option>
        <option value="barangay3">Anilao</option>
        <option value="barangay4">Balabag</option>
        <option value="barangay5">Cabugao Norte</option>
        <option value="barangay6">Cabugao Sur</option>
        <option value="barangay7">Jibao-an</option>
        <option value="barangay8">Mali-ao</option>
        <option value="barangay9">Pagsanga-an</option>
        <option value="barangay10">Pal-agon</option>
        <option value="barangay11">Pandac</option>
        <option value="barangay12">Purok I (Poblacion)</option>
        <option value="barangay13">Purok II (Poblacion)</option>
        <option value="barangay14">Purok III (Poblacion)</option>
        <option value="barangay15">Purok IV (Poblacion)</option>
        <option value="barangay16">Tigum</option>
        <option value="barangay17">Ungka I</option>
        <option value="barangay18">Ungka II</option>
    </select>

    <select>
        <option>Gender *</option>
        <option>Male</option>
        <option>Female</option>
    </select>


    <button class="btn">Next</button>
</form>

</body>
</html>
