<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Appointment</title>
</head>
<body>
    <form id="patient_appointment-container">
        <div class="patientAppointment">
            <label for="patient-name" id="patient_name"></label>
            
            <label for="dob" id="dob">Appointment Date</label>
            <input type="date" required>
            <label for="time" id="appointmentTime">Appointment Time</label>
            <input type="time" required>

            <button class="btn">Save</button>
        </div>
    </form>
</body>
</html>
